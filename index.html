<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recuperação Epicondilite - Protocolo Fisioterapêutico</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  </head>
  <body class="text-slate-200 min-h-screen p-4 pb-12 bg-[#0f172a]">
    <div id="app-root" class="max-w-md mx-auto space-y-6">
      
      <header class="text-center py-6">
          <h1 class="text-2xl font-[800] text-indigo-400 uppercase tracking-tighter">FisioCheck</h1>
          <p class="text-slate-400 text-sm" id="current-date-display"></p>
      </header>

      <div id="day-status-card" class="bg-slate-800 border-l-4 border-indigo-500 p-4 rounded-r-xl shadow-lg">
          <div class="flex justify-between items-center">
              <div>
                  <h2 class="text-xl font-bold" id="day-type-title">Carregando...</h2>
                  <p class="text-sm text-slate-400" id="day-description"></p>
              </div>
              <div class="text-right">
                  <span id="progress-badge" class="bg-indigo-900 text-indigo-300 text-xs font-bold px-2.5 py-0.5 rounded-full">0%</span>
              </div>
          </div>
          <div class="w-full bg-slate-700 rounded-full h-1.5 mt-4">
              <div id="progress-bar" class="bg-indigo-500 h-1.5 rounded-full transition-all duration-500" style="width: 0%"></div>
          </div>
      </div>

      <div class="bg-slate-800 p-4 rounded-xl shadow-md border border-slate-700">
          <label class="block text-xs font-semibold text-slate-400 uppercase mb-3 text-center">Nível de Dor Inicial (0-10)</label>
          <div id="pain-buttons-container" class="flex justify-between gap-1">
              <!-- Buttons will be injected here -->
          </div>
      </div>

      <div id="exercise-list" class="space-y-3">
          <!-- Exercises will be injected here -->
      </div>

      <div id="timer-box" class="bg-slate-800 p-4 rounded-xl border border-slate-700 hidden">
          <div class="flex items-center justify-between">
              <span class="text-sm font-bold text-slate-400 uppercase">Timer Isométrico</span>
              <span id="timer-display" class="text-2xl font-mono text-indigo-400">45s</span>
              <div class="flex gap-2">
                  <button id="timer-btn" class="bg-indigo-600 hover:bg-indigo-700 px-4 py-1 rounded-md text-sm font-bold">Iniciar</button>
                  <button id="reset-timer-btn" class="bg-slate-700 hover:bg-slate-600 px-3 py-1 rounded-md text-sm">↺</button>
              </div>
          </div>
      </div>

      <button id="reset-progress-btn" class="w-full py-3 text-slate-500 text-xs font-semibold hover:text-slate-300 transition-colors">
          LIMPAR PROGRESSO DE HOJE
      </button>

    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
